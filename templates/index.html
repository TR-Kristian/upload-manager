<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HungaroControl – Knowledge Upload Gateway</title>
  <link rel="icon" href="/static/HungaroControl_symbol.png" type="image/png">
	<style>
		:root {
			--bg-deep: #0a2f57;
			--bg-mid: #0f4d86;
			--bg-soft: #ecf4fb;
			--surface: #ffffff;
			--surface-alt: #f5f9fe;
			--ink: #0f2238;
			--ink-soft: #40566f;
			--accent: #0073cf;
			--accent-strong: #005da7;
			--ok: #157347;
			--bad: #b42318;
			--ring: #8fb7dd;
			--shadow: 0 14px 36px rgba(7, 37, 70, 0.18);
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			font-family: "Public Sans", "Segoe UI", sans-serif;
			color: var(--ink);
			background:
				linear-gradient(145deg, rgba(7, 45, 82, 0.94), rgba(14, 77, 132, 0.88)),
				radial-gradient(circle at 85% 8%, rgba(98, 189, 255, 0.35), transparent 38%),
				radial-gradient(circle at 9% 88%, rgba(1, 118, 205, 0.24), transparent 36%);
			min-height: 100vh;
		}

		.page {
			max-width: 1200px;
			margin: 0 auto;
			padding: 26px 24px;
		}

		.brand-bar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 16px;
			padding: 14px 18px;
			background: linear-gradient(100deg, #0b3764, #0f558f);
			border: 1px solid rgba(173, 211, 245, 0.45);
			border-radius: 14px;
			box-shadow: var(--shadow);
			color: #eaf5ff;
			margin-bottom: 16px;
		}

		.brand-left {
			display: flex;
			align-items: center;
			gap: 14px;
		}

		.brand-logo-wrap {
			background: #ffffff;
			border-radius: 8px;
			padding: 7px 14px;
			display: flex;
			align-items: center;
		}

		.brand-logo-wrap img {
			height: 36px;
			width: auto;
			display: block;
		}

		.brand-sub {
			font-size: 0.86rem;
			opacity: 0.86;
		}

		.brand-badge {
			font-size: 0.82rem;
			padding: 6px 10px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.14);
			border: 1px solid rgba(255, 255, 255, 0.28);
			white-space: nowrap;
		}

		.title {
			margin: 0 0 6px;
			font-family: "Rajdhani", "Public Sans", sans-serif;
			font-weight: 700;
			font-size: clamp(1.8rem, 3vw, 2.5rem);
			letter-spacing: 0.03em;
			color: #eef7ff;
			text-transform: uppercase;
		}

		.subtitle {
			margin: 0 0 20px;
			color: #d7e8f8;
			max-width: 70ch;
		}

		.panel {
			background: var(--surface);
			border: 1px solid #c6dbef;
			border-radius: 14px;
			box-shadow: var(--shadow);
			padding: 16px;
		}

		.upload-grid {
			display: grid;
			gap: 14px;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			align-items: end;
		}

		label {
			font-weight: 700;
			display: block;
			margin-bottom: 6px;
			color: #11304f;
		}

		select, input[type="file"], button {
			width: 100%;
			padding: 10px 12px;
			border-radius: 8px;
			border: 1px solid #b8cee4;
			font: inherit;
			background: #f9fcff;
			color: var(--ink);
		}

		button {
			background: var(--accent);
			border: none;
			color: #f5fffd;
			font-weight: 700;
			cursor: pointer;
			transition: transform 120ms ease, background 120ms ease;
		}

		button:hover { background: var(--accent-strong); }
		button:active { transform: translateY(1px); }
		button:disabled { opacity: 0.6; cursor: not-allowed; }

		.status {
			margin: 14px 0 0;
			font-weight: 600;
			min-height: 22px;
		}

		.board {
			display: grid;
			gap: 14px;
			margin-top: 18px;
			grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
		}

		.lane h2 {
			margin: 0 0 10px;
			font-size: 1.1rem;
			font-family: "Rajdhani", "Public Sans", sans-serif;
			text-transform: uppercase;
			letter-spacing: 0.04em;
			display: flex;
			justify-content: space-between;
			align-items: baseline;
		}

		.count {
			font-size: 0.95rem;
			color: #3f5d7e;
		}

		.cards {
			display: grid;
			gap: 10px;
			max-height: 58vh;
			overflow: auto;
			padding-right: 2px;
		}

		.card {
			background: var(--surface-alt);
			border: 1px solid #c5d9ec;
			border-left: 6px solid #3f87c8;
			border-radius: 10px;
			padding: 10px;
			animation: pop 240ms ease;
		}

		.card.completed { border-left-color: var(--ok); }
		.card.failed { border-left-color: var(--bad); }

		.filename {
			font-weight: 700;
			word-break: break-word;
		}

		.meta {
			font-size: 0.9rem;
			color: #456280;
			margin-top: 4px;
		}

		.error {
			margin-top: 6px;
			color: var(--bad);
			font-size: 0.9rem;
			white-space: pre-wrap;
			max-height: 120px;
			overflow: auto;
		}

		.retry-btn {
			margin-top: 8px;
			background: #b42318;
			color: #fff5f5;
			border: none;
			border-radius: 8px;
			padding: 8px 10px;
			cursor: pointer;
			font-weight: 700;
		}

		.retry-btn:hover { background: #991b1b; }

		.empty {
			padding: 12px;
			border: 1px dashed #a5c4e2;
			border-radius: 10px;
			color: #4c6783;
			background: rgba(247, 252, 255, 0.8);
			font-size: 0.95rem;
		}

		@keyframes pop {
			from { opacity: 0; transform: translateY(8px); }
			to { opacity: 1; transform: translateY(0); }
		}

		@media (max-width: 760px) {
			.page { padding: 14px; }
			.brand-bar {
				flex-direction: column;
				align-items: flex-start;
			}
			.board { grid-template-columns: 1fr; }
			.cards { max-height: none; }
		}
	</style>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
	<main class="page">
		<header class="brand-bar">
			<div class="brand-left">
				<div class="brand-logo-wrap">
					<img src="/static/HungaroControl_logos_noslogan.png" alt="HungaroControl" height="36">
				</div>
				<div class="brand-sub">Internal Knowledge Operations</div>
			</div>
			<div class="brand-badge">Document Intake Gateway</div>
		</header>

		<h1 class="title">Knowledge Upload Gateway</h1>
		<p class="subtitle">Use this page as the single upload point. Pick a knowledge base, add files, and track them in Waiting, Completed, and Failed lanes.</p>

		<section class="panel">
			<div class="upload-grid">
				<div>
					<label for="kbSelect">Knowledge Base</label>
					<select id="kbSelect"></select>
				</div>
				<div>
					<label for="fileInput">Files</label>
					<input id="fileInput" type="file" multiple>
				</div>
				<div>
					<button id="uploadBtn" type="button">Queue Upload</button>
				</div>
			</div>
			<div id="statusText" class="status"></div>
		</section>

		<section class="board">
			<article class="panel lane">
				<h2>Waiting <span id="waitingCount" class="count">0</span></h2>
				<div id="waitingCards" class="cards"></div>
			</article>
			<article class="panel lane">
				<h2>Completed <span id="completedCount" class="count">0</span></h2>
				<div id="completedCards" class="cards"></div>
			</article>
			<article class="panel lane">
				<h2>Failed <span id="failedCount" class="count">0</span></h2>
				<div id="failedCards" class="cards"></div>
			</article>
		</section>
	</main>

	<script>
		const kbSelect = document.getElementById("kbSelect");
		const fileInput = document.getElementById("fileInput");
		const uploadBtn = document.getElementById("uploadBtn");
		const statusText = document.getElementById("statusText");

		const waitingCards = document.getElementById("waitingCards");
		const completedCards = document.getElementById("completedCards");
		const failedCards = document.getElementById("failedCards");
		const waitingCount = document.getElementById("waitingCount");
		const completedCount = document.getElementById("completedCount");
		const failedCount = document.getElementById("failedCount");

		function setStatus(message, kind = "info") {
			statusText.textContent = message;
			if (kind === "error") statusText.style.color = "#991b1b";
			else if (kind === "success") statusText.style.color = "#166534";
			else statusText.style.color = "#2f261c";
		}

		function formatDate(value) {
			if (!value) return "-";
			const d = new Date(value);
			if (Number.isNaN(d.getTime())) return value;
			return d.toLocaleString();
		}

		function renderCards(target, items, state) {
			target.innerHTML = "";
			if (!items.length) {
				const div = document.createElement("div");
				div.className = "empty";
				div.textContent = "No files";
				target.appendChild(div);
				return;
			}

			items.forEach((item) => {
				const card = document.createElement("div");
				card.className = `card ${state}`;

				const label = item.status === "processing" ? "Processing" : item.status;
				const kb = item.kb_name || item.kb_id || "-";

				card.innerHTML = `
					<div class="filename">${item.filename}</div>
					<div class="meta">KB: ${kb}</div>
					<div class="meta">State: ${label}</div>
					<div class="meta">Attempt: ${item.attempt_count}/${item.max_attempts}</div>
					<div class="meta">Updated: ${formatDate(item.updated_at)}</div>
				`;

				if (state === "failed" && item.last_error) {
					const err = document.createElement("div");
					err.className = "error";
					err.textContent = item.last_error;
					card.appendChild(err);

					const retryBtn = document.createElement("button");
					retryBtn.className = "retry-btn";
					retryBtn.type = "button";
					retryBtn.textContent = "Retry";
					retryBtn.addEventListener("click", async () => {
						retryBtn.disabled = true;
						try {
							const res = await fetch(`/api/jobs/${item.id}/retry`, { method: "POST" });
							if (!res.ok) {
								const data = await res.json().catch(() => ({}));
								throw new Error(data.error || `HTTP ${res.status}`);
							}
							setStatus(`Retry queued for ${item.filename}`, "success");
							await refreshJobs();
						} catch (err) {
							setStatus(`Retry failed: ${err.message}`, "error");
						} finally {
							retryBtn.disabled = false;
						}
					});
					card.appendChild(retryBtn);
				}

				target.appendChild(card);
			});
		}

		async function refreshKnowledgeBases() {
			kbSelect.innerHTML = "";
			const placeholder = document.createElement("option");
			placeholder.value = "";
			placeholder.textContent = "Loading knowledge bases...";
			kbSelect.appendChild(placeholder);

			try {
				const res = await fetch("/api/knowledge-bases");
				const data = await res.json();
				if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

				kbSelect.innerHTML = "";
				data.items.forEach((kb) => {
					const option = document.createElement("option");
					option.value = kb.id;
					option.textContent = kb.name;
					option.dataset.name = kb.name;
					kbSelect.appendChild(option);
				});

				if (!data.items.length) {
					const none = document.createElement("option");
					none.value = "";
					none.textContent = "No knowledge bases found";
					kbSelect.appendChild(none);
				}
			} catch (err) {
				kbSelect.innerHTML = "";
				const errOpt = document.createElement("option");
				errOpt.value = "";
				errOpt.textContent = "Failed to load knowledge bases";
				kbSelect.appendChild(errOpt);
				setStatus(`Knowledge base load failed: ${err.message}`, "error");
			}
		}

		async function refreshJobs() {
			try {
				const res = await fetch("/api/jobs");
				const data = await res.json();
				if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

				renderCards(waitingCards, data.waiting || [], "waiting");
				renderCards(completedCards, data.completed || [], "completed");
				renderCards(failedCards, data.failed || [], "failed");

				waitingCount.textContent = String((data.waiting || []).length);
				completedCount.textContent = String((data.completed || []).length);
				failedCount.textContent = String((data.failed || []).length);
			} catch (err) {
				setStatus(`Failed to refresh jobs: ${err.message}`, "error");
			}
		}

		uploadBtn.addEventListener("click", async () => {
			const kbId = kbSelect.value;
			const kbName = kbSelect.options[kbSelect.selectedIndex]?.textContent || "";
			const files = fileInput.files;

			if (!kbId) {
				setStatus("Please select a knowledge base.", "error");
				return;
			}
			if (!files || files.length === 0) {
				setStatus("Please select at least one file.", "error");
				return;
			}

			const formData = new FormData();
			formData.append("kb_id", kbId);
			formData.append("kb_name", kbName);
			Array.from(files).forEach((file) => formData.append("files", file));

			uploadBtn.disabled = true;
			setStatus("Queueing files...");
			try {
				const res = await fetch("/api/jobs", {
					method: "POST",
					body: formData
				});
				const data = await res.json();
				if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

				const created = (data.created_ids || []).length;
				const rejected = (data.rejected || []).length;
				setStatus(`Queued ${created} file(s). Rejected ${rejected}.`, "success");
				fileInput.value = "";
				await refreshJobs();
			} catch (err) {
				setStatus(`Upload queue failed: ${err.message}`, "error");
			} finally {
				uploadBtn.disabled = false;
			}
		});

		async function init() {
			await refreshKnowledgeBases();
			await refreshJobs();
			window.setInterval(refreshJobs, 2000);
			window.setInterval(refreshKnowledgeBases, 30000);
		}

		init();
	</script>
</body>
</html>
